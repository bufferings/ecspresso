# .github/workflows/notify-devin-via-webhook.yml
name: Ask Devin to update documents via Slack Webhook

on:
  push:
    paths-ignore:
      - 'docs-devin/**'
    branches:
      - v2

jobs:
  prompt-devin:
    runs-on: ubuntu-latest
    steps:
      - name: Send prompt via Incoming Webhook
        run: |
          SLACK_TEXT=""
          SLACK_TEXT+="<@U08PYJ5B9LK> bufferings/ecspresso のブランチ v2 が対象です。\n"
          SLACK_TEXT+="Goのソースコードの実装詳細に基づいた、ecspressoの利用者向け技術的な日本語ドキュメントをHTMLで作成してください。\n"
          SLACK_TEXT+="README.mdと既存のドキュメントは参考にせず、「どう使うか」に焦点を当てた内容にしてください。\n"
          SLACK_TEXT+="\n"
          SLACK_TEXT+="以下の目次構造に従ってください：\n"
          SLACK_TEXT+="   1.1 ecspressoとは\n"
          SLACK_TEXT+="   1.2 インストール方法\n"
          SLACK_TEXT+="   2.1 基本的な使い方\n"
          SLACK_TEXT+="   2.2 よくあるユースケース\n"
          SLACK_TEXT+="   3.1 デプロイ関連コマンド\n"
          SLACK_TEXT+="   3.2 タスク関連コマンド\n"
          SLACK_TEXT+="   3.3 設定・検証コマンド\n"
          SLACK_TEXT+="   4.1 CI/CDパイプラインとの統合\n"
          SLACK_TEXT+="   4.2 複数環境での運用\n"
          SLACK_TEXT+="   4.3 大規模サービスの管理\n"
          SLACK_TEXT+="\n"
          SLACK_TEXT+="各メインセクション（1., 2., 3., 4., 5.）とそのサブセクションは一つのHTMLファイルにまとめてください。\n"
          SLACK_TEXT+="各HTMLファイルの冒頭には、そのメインセクション全体の概要を数行で簡潔に説明してから、サブセクションの内容に進んでください。\n"
          SLACK_TEXT+="\n"
          SLACK_TEXT+="Mermaid.js（CDN版）を使用して、理解を助けるアーキテクチャ図やデータフロー図を作成してください。\n"
          SLACK_TEXT+="図は利用者がecspressoの使い方を理解するのに役立つものを選んでください。\n"
          SLACK_TEXT+="\n"
          SLACK_TEXT+="ドキュメントは以下の点に注意して作成してください：\n"
          SLACK_TEXT+="- 実装の詳細ではなく、「どう使うか」に焦点を当てる\n"
          SLACK_TEXT+="- 実際のコマンド使用例を豊富に含める\n"
          SLACK_TEXT+="- 一般的なユースケースとその解決方法を示す\n"
          SLACK_TEXT+="- エラー対処法やトラブルシューティングのヒントを含める\n"
          SLACK_TEXT+="- 利用者が必要とする情報に簡潔にアクセスできるようにする\n"
          SLACK_TEXT+="\n"
          SLACK_TEXT+="ドキュメントが完成したら、docs-devinフォルダ内のドキュメントを新しいものに置き換え、プルリクエストを作成してください。"
          
          payload="{\"text\":\"${SLACK_TEXT//\"/\\\"}\"}"

          curl -X POST -H 'Content-Type: application/json' \
               --data "$payload" \
               "${{ secrets.SLACK_DEVIN_CALLER_WEBHOOK_URL }}"
