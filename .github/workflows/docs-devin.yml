# .github/workflows/notify-devin-via-webhook.yml
name: Ask Devin to update documents via Slack Webhook

on:
  push:
    paths-ignore:
      - 'docs-devin/**'
    branches:
      - v2

jobs:
  prompt-devin:
    runs-on: ubuntu-latest
    steps:
      - name: Send prompt via Incoming Webhook
        run: |
          SLACK_TEXT="<@U08PYJ5B9LK> "

          SLACK_TEXT+="bufferings/ecspresso リポジトリのv2ブランチで、Goソースコードのみを分析して新しい日本語ドキュメントを作成してください。"
          SLACK_TEXT+="既存のREADME.md、docs、docs-devinフォルダ内のドキュメントは絶対に参照しないでください。"
          SLACK_TEXT+="実装方針の確認はせずにプルリクエストを作りきってください。\n"
          SLACK_TEXT+="\n"
          SLACK_TEXT+="1. 分析対象：Goソースコードのみ（既存ドキュメント参照禁止）\n"
          SLACK_TEXT+="2. 出力形式：レスポンシブデザインのHTMLファイル\n"
          SLACK_TEXT+="3. 内容：「どう使うか」に焦点を当てた技術ドキュメント\n"
          SLACK_TEXT+="4. 目次構造：\n"
          SLACK_TEXT+="   - 1. はじめに\n"
          SLACK_TEXT+="     - 1.1 ecspressoとは\n"
          SLACK_TEXT+="     - 1.2 インストール方法\n"
          SLACK_TEXT+="   - 2. クイックスタート\n"
          SLACK_TEXT+="     - 2.1 基本的な使い方\n"
          SLACK_TEXT+="     - 2.2 よくあるユースケース\n"
          SLACK_TEXT+="   - 3. コマンドリファレンス\n"
          SLACK_TEXT+="     - 3.1 デプロイ関連コマンド\n"
          SLACK_TEXT+="     - 3.2 タスク関連コマンド\n"
          SLACK_TEXT+="     - 3.3 設定・検証コマンド\n"
          SLACK_TEXT+="   - 4. 実践ガイド\n"
          SLACK_TEXT+="     - 4.1 CI/CDパイプラインとの統合\n"
          SLACK_TEXT+="     - 4.2 複数環境での運用\n"
          SLACK_TEXT+="     - 4.3 大規模サービスの管理\n"
          SLACK_TEXT+="   - 5. トラブルシューティング\n"
          SLACK_TEXT+="5. ファイル構成：各セクション・サブセクションは別々のHTMLファイル（サブセクションがあるセクションのファイルでは、そのセクション全体の概要を数行で簡潔に説明）\n"
          SLACK_TEXT+="6. 図表：Mermaid.js（CDN版）を使用したアーキテクチャ図・データフロー図（テキスト形式で記述、事前レンダリング画像は不使用）\n"
          SLACK_TEXT+="7. 完了後：docs-devinフォルダ内のドキュメントを新しいものに置き換え、プルリクエストを作成\n"

          payload="{\"text\":\"${SLACK_TEXT//\"/\\\"}\"}"

          curl -X POST -H 'Content-Type: application/json' \
               --data "$payload" \
               "${{ secrets.SLACK_DEVIN_CALLER_WEBHOOK_URL }}"
