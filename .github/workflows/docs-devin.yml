# .github/workflows/notify-devin-via-webhook.yml
name: Ask Devin to update documents via Slack Webhook

on:
  push:
    paths-ignore:
      - 'docs-devin/**'
    branches:
      - v2

jobs:
  prompt-devin:
    runs-on: ubuntu-latest
    steps:
      - name: Send prompt via Incoming Webhook
        run: |
          SLACK_TEXT="<@U08PYJ5B9LK>"

          SLACK_TEXT+="bufferings/ecspresso リポジトリのv2ブランチを対象に、新しい日本語ドキュメントを作成してください。\n"
          SLACK_TEXT+="【重要】：既存のREADME.mdやdocs、docs-devinフォルダ内のドキュメントは一切参照せず、Goソースコードのみを分析してください。\n"
          SLACK_TEXT+="Goソースコードから理解した実装に基づいて、「どう使うか」に焦点を当てた技術ドキュメントをHTML形式で作成してください。\n"
          SLACK_TEXT+="レスポンシブデザインを採用し、以下の目次構造に従ってください：\n"
          SLACK_TEXT+="1. はじめに\n"
          SLACK_TEXT+="   1.1 ecspressoとは\n"
          SLACK_TEXT+="   1.2 インストール方法\n"
          SLACK_TEXT+="2. クイックスタート\n"
          SLACK_TEXT+="   2.1 基本的な使い方\n"
          SLACK_TEXT+="   2.2 よくあるユースケース\n"
          SLACK_TEXT+="3. コマンドリファレンス\n"
          SLACK_TEXT+="   3.1 デプロイ関連コマンド\n"
          SLACK_TEXT+="   3.2 タスク関連コマンド\n"
          SLACK_TEXT+="   3.3 設定・検証コマンド\n"
          SLACK_TEXT+="4. 実践ガイド\n"
          SLACK_TEXT+="   4.1 CI/CDパイプラインとの統合\n"
          SLACK_TEXT+="   4.2 複数環境での運用\n"
          SLACK_TEXT+="   4.3 大規模サービスの管理\n"
          SLACK_TEXT+="5. トラブルシューティング\n"
          SLACK_TEXT+="各セクションとサブセクションは別々のHTMLファイルとして作成してください。サブセクションがあるセクションのファイルでは、そのセクション全体の概要を数行で簡潔に説明してください。\n"
          SLACK_TEXT+="Mermaid.js（CDN版）を使用して、理解を助けるアーキテクチャ図やデータフロー図を作成してください。図はテキスト形式で記述し、事前レンダリング画像は使用しないでください。\n"
          SLACK_TEXT+="ドキュメントが完成したら、docs-devinフォルダ内のドキュメントを新しいものに置き換え、プルリクエストを作成してください。\n"

          payload="{\"text\":\"${SLACK_TEXT//\"/\\\"}\"}"

          curl -X POST -H 'Content-Type: application/json' \
               --data "$payload" \
               "${{ secrets.SLACK_DEVIN_CALLER_WEBHOOK_URL }}"
