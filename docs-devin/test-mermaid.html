<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Test - ecspresso</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      mermaid.initialize({
        startOnLoad: true,
        theme: 'default',
        securityLevel: 'loose'
      });
    });
  </script>
</head>
<body>
  <h1>Mermaid Test</h1>
  
  <h2>Simple Flowchart</h2>
  <div class="mermaid">
%%{init: {'theme': 'default'}}%%
graph TD
A[Start] --> B[End]
</div>
  
  <h2>Simple Sequence Diagram</h2>
  <div class="mermaid">
%%{init: {'theme': 'default'}}%%
sequenceDiagram
A->>B: Hello
B->>A: Hi
</div>
</body>
</html>
